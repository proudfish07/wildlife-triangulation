<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Wildlife Triangulation Pro</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --primary: #2e7d32;
      --secondary: #1976d2;
      --danger: #d32f2f;
      --share: #546e7a;
      --panel-bg: #ffffff;
    }

    /* 核心佈局修正：放棄彈性高度，改用絕對填滿 */
    html, body { 
      margin: 0; padding: 0;
      width: 100vw; height: 100vh;
      overflow: hidden;
      background-color: #f0f2f5;
      font-family: -apple-system, sans-serif;
    }

    /* 強制地圖佔據上半部 (45%) */
    #map { 
      position: absolute;
      top: 0; left: 0;
      width: 100%;
      height: 45%; 
      z-index: 10;
      background: #ddd; /* 預留底色，若地圖沒載入也會有灰色 */
    }

    /* 面板佔據下半部 (55%) */
    .bottom-panel {
      position: absolute;
      bottom: 0; left: 0;
      width: 100%;
      height: 55%;
      background: var(--panel-bg);
      z-index: 1000;
      box-shadow: 0 -5px 15px rgba(0,0,0,0.2);
      border-radius: 20px 20px 0 0;
      display: flex;
      flex-direction: column;
      box-sizing: border-box;
      padding: 16px;
      /* 針對 iPhone 安全區域修正 */
      padding-bottom: env(safe-area-inset-bottom, 16px);
    }

    .sticky-controls {
      flex-shrink: 0;
      margin-bottom: 12px;
    }

    .action-grid {
      display: grid; 
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    button {
      border: none; padding: 14px 5px; border-radius: 12px;
      font-size: 1rem; font-weight: bold; color: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
    }

    .btn-record { background: var(--primary); }
    .btn-calc { background: var(--secondary); }
    .btn-share { background: var(--share); }
    .btn-clear { background: #9e9e9e; }

    .table-scroll {
      width: 100%; 
      overflow-x: auto; 
      overflow-y: auto;
      border: 1px solid #ddd; 
      border-radius: 12px;
      flex-grow: 1; /* 讓表格吃掉剩餘空間 */
      background: white;
    }

    .input-table { width: 100%; min-width: 800px; border-collapse: collapse; font-size: 0.85rem; }
    .input-table th { background: #f8f9fa; padding: 12px; position: sticky; top: 0; z-index: 20; border-bottom: 2px solid #eee; }
    .input-table td { padding: 8px 4px; border-bottom: 1px solid #eee; text-align: center; }
    .input-table input { width: 90%; border: 1px solid #eee; padding: 8px 2px; border-radius: 4px; text-align: center; font-size: 0.85rem; }

    .btn-status { padding: 6px 8px; border-radius: 6px; font-weight: bold; border: none; width: 50px; }
    .status-yes { background: #4caf50 !important; color: white; }
    .status-no { background: #f44336 !important; color: white; }

    .result-card { background: #e3f2fd; padding: 12px; border-radius: 10px; margin-top: 10px; border-left: 5px solid var(--secondary); flex-shrink: 0; }
    .hint { font-size: 0.75rem; color: #888; margin-top: 8px; text-align: center; }
  </style>
</head>
<body>

  <div id="map"></div>

  <div class="bottom-panel">
    <div class="sticky-controls">
      <div class="action-grid">
        <button class="btn-record" onclick="recordPoint()">📍 自動定位</button>
        <button class="btn-calc" onclick="processInput()">📐 交點計算</button>
        <button class="btn-share" onclick="handleShareClick()">📤 分享報表</button>
        <button class="btn-clear" onclick="clearAllData()">🗑️ 清除所有</button>
      </div>
      <p class="hint">⬅️ 左右滑動表格修改數據 ➡️</p>
    </div>

    <div class="table-scroll">
      <table class="input-table">
        <thead>
          <tr>
            <th style="width: 110px;">日期</th>
            <th style="width: 80px;">時間</th>
            <th style="width: 100px;">緯度</th>
            <th style="width: 100px;">經度</th>
            <th style="width: 80px;">方位°</th>
            <th style="width: 60px;">Gain</th>
            <th style="width: 60px;">強度</th>
            <th style="width: 70px;">活動</th>
            <th style="width: 40px;"></th>
          </tr>
        </thead>
        <tbody id="inputTableBody"></tbody>
      </table>
    </div>
    
    <div id="resultArea"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    // 解決 PWA 模式下地圖載入不全的問題
    const map = L.map('map', { zoomControl: false }).setView([23.5, 121], 7);
    L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png').addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);

    // 強制在載入後刷新地圖尺寸
    setTimeout(() => { map.invalidateSize(); }, 500);

    let recordedPoints = JSON.parse(localStorage.getItem('wildlife_points') || '[]');
    let currentPrediction = null;

    function renderInputTable() {
      const tbody = document.getElementById('inputTableBody');
      if (!tbody) return;
      tbody.innerHTML = '';
      recordedPoints.forEach((p, idx) => {
        const row = document.createElement('tr');
        const statusClass = p.isActive === '是' ? 'status-yes' : 'status-no';
        row.innerHTML = `
          <td><input type="text" value="${p.date}" onchange="updatePoint(${idx}, 'date', this.value)"></td>
          <td><input type="text" value="${p.time}" onchange="updatePoint(${idx}, 'time', this.value)"></td>
          <td><input type="number" step="any" value="${p.lat}" onchange="updatePoint(${idx}, 'lat', this.value)"></td>
          <td><input type="number" step="any" value="${p.lon}" onchange="updatePoint(${idx}, 'lon', this.value)"></td>
          <td><input type="number" value="${p.bearing}" onchange="updatePoint(${idx}, 'bearing', this.value)"></td>
          <td><input type="number" value="${p.gain || ''}" onchange="updatePoint(${idx}, 'gain', this.value)"></td>
          <td><input type="number" value="${p.strength || ''}" onchange="updatePoint(${idx}, 'strength', this.value)"></td>
          <td><button class="btn-status ${statusClass}" onclick="toggleStatus(${idx})">${p.isActive || '否'}</button></td>
          <td><button style="background:none; color:red; font-size:1.5rem; border:none;" onclick="deletePoint(${idx})">×</button></td>
        `;
        tbody.appendChild(row);
      });
    }

    function toggleStatus(idx) {
      recordedPoints[idx].isActive = recordedPoints[idx].isActive === '是' ? '否' : '是';
      saveAndRender();
    }

    function updatePoint(idx, key, val) {
      recordedPoints[idx][key] = val;
      localStorage.setItem('wildlife_points', JSON.stringify(recordedPoints));
    }

    function deletePoint(idx) {
      if(confirm('刪除此筆資料？')) {
        recordedPoints.splice(idx, 1);
        saveAndRender();
      }
    }

    function saveAndRender() {
      localStorage.setItem('wildlife_points', JSON.stringify(recordedPoints));
      renderInputTable();
    }

    function recordPoint() {
      if (!navigator.geolocation) return alert('不支援定位');
      navigator.geolocation.getCurrentPosition(pos => {
        const now = new Date();
        recordedPoints.push({
          date: `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')}`,
          time: `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`,
          lat: pos.coords.latitude.toFixed(5),
          lon: pos.coords.longitude.toFixed(5),
          bearing: '', gain: '', strength: '', isActive: '否'
        });
        saveAndRender();
      }, () => alert('定位失敗'));
    }

    function processInput() {
      map.eachLayer(l => { if(l instanceof L.Marker || l instanceof L.Polyline) map.removeLayer(l); });
      const validLines = [];
      recordedPoints.forEach((p) => {
        const lat = parseFloat(p.lat), lon = parseFloat(p.lon), brng = parseFloat(p.bearing);
        if (!isNaN(lat) && !isNaN(lon) && !isNaN(brng)) {
          const color = `hsl(${brng % 360}, 80%, 40%)`;
          L.circleMarker([lat, lon], { radius: 6, color: color, fillOpacity: 1 }).addTo(map);
          const rad = (90 - brng) * Math.PI / 180;
          const endLat = lat + Math.sin(rad) * 0.15;
          const endLon = lon + Math.cos(rad) * 0.15;
          L.polyline([[lat, lon], [endLat, endLon]], { color: color, weight: 4 }).addTo(map);
          validLines.push({ x: lon, y: lat, dx: Math.cos(rad), dy: Math.sin(rad) });
        }
      });

      let intersects = [];
      for (let i = 0; i < validLines.length; i++) {
        for (let j = i + 1; j < validLines.length; j++) {
          const l1 = validLines[i], l2 = validLines[j];
          const det = l1.dx * l2.dy - l1.dy * l2.dx;
          if (Math.abs(det) > 1e-10) {
            const t = ((l2.x - l1.x) * l2.dy - (l2.y - l1.y) * l2.dx) / det;
            intersects.push([l1.y + l1.dy * t, l1.x + l1.dx * t]);
          }
        }
      }

      if (intersects.length > 0) {
        const avgLat = intersects.reduce((a,b) => a + b[0], 0) / intersects.length;
        const avgLon = intersects.reduce((a,b) => a + b[1], 0) / intersects.length;
        currentPrediction = { lat: avgLat, lon: avgLon };
        L.marker([avgLat, avgLon]).addTo(map).bindPopup("預估目標").openPopup();
        map.setView([avgLat, avgLon], 14);
        document.getElementById('resultArea').innerHTML = `<div class="result-card">🎯 預測座標: ${avgLat.toFixed(5)}, ${avgLon.toFixed(5)}</div>`;
      }
    }

    function handleShareClick() {
      if (recordedPoints.length === 0) return alert('無資料可分享');
      let text = `【野生動物追蹤報告】\n`;
      recordedPoints.forEach((p, i) => {
        text += `\n#${i+1} ${p.date} ${p.time}\n方位: ${p.bearing}° | G:${p.gain||'-'} | S:${p.strength||'-'} | 活動:${p.isActive}\n-------------------`;
      });
      if (currentPrediction) {
        text += `\n\n🎯 預測位置：${currentPrediction.lat.toFixed(5)}, ${currentPrediction.lon.toFixed(5)}\nGoogle Maps: http://googleusercontent.com/maps.google.com/5{currentPrediction.lat.toFixed(5)},${currentPrediction.lon.toFixed(5)}`;
      }

      if (navigator.share) {
        navigator.share({ title: '追蹤紀錄', text: text }).catch(() => copyToClipboard(text));
      } else {
        copyToClipboard(text);
      }
    }

    function copyToClipboard(text) {
      const textArea = document.createElement("textarea");
      textArea.value = text;
      document.body.appendChild(textArea);
      textArea.select();
      document.execCommand('copy');
      document.body.removeChild(textArea);
      alert('已自動複製報表到剪貼簿，請貼上分享。');
    }

    function clearAllData() {
      if (confirm('確定清除所有資料嗎？')) {
        recordedPoints = [];
        localStorage.removeItem('wildlife_points');
        location.reload();
      }
    }

    window.onload = renderInputTable;
  </script>
</body>
</html>
