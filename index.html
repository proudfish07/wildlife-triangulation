<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wildlife Triangulation Tool Pro</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --primary: #2e7d32;
      --secondary: #1976d2;
      --danger: #d32f2f;
      --glass: rgba(255, 255, 255, 0.95);
    }

    body { 
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: #f0f2f5;
      height: 100vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    #map { flex: 1; width: 100%; z-index: 1; }

    /* 底部面板 */
    .bottom-panel {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 1000;
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
      padding: 16px;
      max-height: 50vh;
      overflow-y: auto;
    }

    h2 { margin: 0 0 12px 0; font-size: 1.1rem; color: #333; }

    .action-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 10px; margin-bottom: 15px;
    }

    button {
      border: none; padding: 12px 8px; border-radius: 10px;
      font-size: 0.9rem; font-weight: 600; color: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;
    }

    .btn-record { background: var(--primary); }
    .btn-calc { background: var(--secondary); }
    .btn-share { background: #607d8b; }
    .btn-clear { background: #9e9e9e; }

    /* 重點：讓表格在手機上可以左右滑動，不會擠壓 */
    .table-scroll {
      width: 100%;
      overflow-x: auto;
      background: white;
      border-radius: 12px;
      border: 1px solid #ddd;
      margin-top: 10px;
    }

    .input-table {
      width: 100%;
      min-width: 500px; /* 強制最小寬度，確保欄位不重疊 */
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .input-table th {
      background: #f8f9fa; padding: 10px;
      border-bottom: 2px solid #eee; color: #666;
    }

    .input-table td {
      padding: 8px 4px; border-bottom: 1px solid #eee; text-align: center;
    }

    .input-table input {
      width: 90%; border: 1px solid #eee; padding: 6px;
      border-radius: 4px; text-align: center; font-size: 0.85rem;
    }

    .result-card {
      background: #e3f2fd; padding: 12px; border-radius: 10px;
      margin-top: 10px; border-left: 4px solid var(--secondary);
    }

    .del-btn { background: none; color: var(--danger); font-size: 1.2rem; cursor: pointer; }

    .hint { font-size: 0.75rem; color: #888; margin-bottom: 8px; text-align: center; }
  </style>
</head>
<body>

  <div id="map"></div>

  <div class="bottom-panel">
    <h2>🐾 野生動物三角定位</h2>
    
    <div class="action-grid">
      <button class="btn-record" onclick="recordPoint()">📍 自動定位</button>
      <button class="btn-calc" onclick="processInput()">📐 交點計算</button>
      <button class="btn-share" onclick="shareLocation()">📤 分享座標</button>
      <button class="btn-clear" onclick="clearAllData()">🗑️ 清除</button>
    </div>

    <p class="hint">⬅️ 左右滑動表格填寫方位角、Gain 與強度 ➡️</p>

    <div class="table-scroll">
      <table class="input-table">
        <thead>
          <tr>
            <th style="width: 60px;">時間</th>
            <th>緯度</th>
            <th>經度</th>
            <th style="width: 70px;">方位角</th>
            <th style="width: 60px;">Gain</th>
            <th style="width: 60px;">強度</th>
            <th style="width: 40px;"></th>
          </tr>
        </thead>
        <tbody id="inputTableBody"></tbody>
      </table>
    </div>
    
    <div id="resultArea"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { zoomControl: false }).setView([23.5, 121], 7);
    L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
      attribution: '© OpenTopoMap'
    }).addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);

    let recordedPoints = JSON.parse(localStorage.getItem('wildlife_points') || '[]');
    let currentPrediction = null;

    function renderInputTable() {
      const tbody = document.getElementById('inputTableBody');
      tbody.innerHTML = '';
      recordedPoints.forEach((p, idx) => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${p.time.substring(0,5)}</td>
          <td><input type="number" step="any" value="${p.lat}" onchange="updatePoint(${idx}, 'lat', this.value)"></td>
          <td><input type="number" step="any" value="${p.lon}" onchange="updatePoint(${idx}, 'lon', this.value)"></td>
          <td><input type="number" placeholder="°" value="${p.bearing}" onchange="updatePoint(${idx}, 'bearing', this.value)"></td>
          <td><input type="number" value="${p.gain || ''}" onchange="updatePoint(${idx}, 'gain', this.value)"></td>
          <td><input type="number" value="${p.strength || ''}" onchange="updatePoint(${idx}, 'strength', this.value)"></td>
          <td><button class="del-btn" onclick="deletePoint(${idx})">×</button></td>
        `;
        tbody.appendChild(row);
      });
    }

    function updatePoint(idx, key, val) {
      recordedPoints[idx][key] = val;
      localStorage.setItem('wildlife_points', JSON.stringify(recordedPoints));
    }

    function deletePoint(idx) {
      recordedPoints.splice(idx, 1);
      saveAndRender();
    }

    function saveAndRender() {
      localStorage.setItem('wildlife_points', JSON.stringify(recordedPoints));
      renderInputTable();
    }

    function recordPoint() {
      if (!navigator.geolocation) return alert('不支援定位');
      navigator.geolocation.getCurrentPosition(pos => {
        const now = new Date();
        recordedPoints.push({
          time: now.getHours().toString().padStart(2,'0') + ":" + now.getMinutes().toString().padStart(2,'0'),
          lat: pos.coords.latitude.toFixed(5),
          lon: pos.coords.longitude.toFixed(5),
          bearing: '',
          gain: '',
          strength: ''
        });
        saveAndRender();
      }, () => alert('定位失敗'));
    }

    function processInput() {
      map.eachLayer(l => { if(l instanceof L.Marker || l instanceof L.Polyline) map.removeLayer(l); });
      const validLines = [];
      recordedPoints.forEach((p, idx) => {
        const lat = parseFloat(p.lat), lon = parseFloat(p.lon), brng = parseFloat(p.bearing);
        if (!isNaN(lat) && !isNaN(lon) && !isNaN(brng)) {
          const color = `hsl(${brng % 360}, 75%, 45%)`;
          L.circleMarker([lat, lon], { radius: 6, color: color, fillOpacity: 1 }).addTo(map);
          const rad = brng * Math.PI / 180;
          const endLat = lat + Math.cos(rad) * 0.15;
          const endLon = lon + Math.sin(rad) * 0.15;
          L.polyline([[lat, lon], [endLat, endLon]], { color: color, weight: 3 }).addTo(map);
          validLines.push({ x: lon, y: lat, dx: Math.sin(rad), dy: Math.cos(rad) });
        }
      });

      let intersects = [];
      for (let i = 0; i < validLines.length; i++) {
        for (let j = i + 1; j < validLines.length; j++) {
          const l1 = validLines[i], l2 = validLines[j];
          const det = l1.dx * l2.dy - l1.dy * l2.dx;
          if (Math.abs(det) > 1e-10) {
            const t = ((l2.x - l1.x) * l2.dy - (l2.y - l1.y) * l2.dx) / det;
            intersects.push([l1.y + l1.dy * t, l1.x + l1.dx * t]);
          }
        }
      }

      if (intersects.length > 0) {
        const avgLat = intersects.reduce((a,b) => a + b[0], 0) / intersects.length;
        const avgLon = intersects.reduce((a,b) => a + b[1], 0) / intersects.length;
        currentPrediction = { lat: avgLat, lon: avgLon };
        L.marker([avgLat, avgLon]).addTo(map).bindPopup("預估目標位置").openPopup();
        map.setView([avgLat, avgLon], 14);
        document.getElementById('resultArea').innerHTML = `<div class="result-card"><strong>🎯 預測位置</strong><br>緯度: ${avgLat.toFixed(5)} / 經度: ${avgLon.toFixed(5)}</div>`;
      }
    }

    function shareLocation() {
      if (!currentPrediction) return alert('請先計算');
      let text = `【野生動物追蹤報告】\n預測位置：${currentPrediction.lat.toFixed(5)}, ${currentPrediction.lon.toFixed(5)}\n\n詳細數據：\n`;
      recordedPoints.forEach((p, i) => {
        text += `${i+1}. 方向:${p.bearing}°, Gain:${p.gain||'-'}, 強度:${p.strength||'-'}\n`;
      });
      text += `Google Maps: https://www.google.com/maps?q=${currentPrediction.lat},${currentPrediction.lon}`;
      
      if (navigator.share) {
        navigator.share({ title: '追蹤結果', text: text });
      } else {
        alert('內容已複製');
      }
    }

    function clearAllData() {
      if (confirm('確定清除嗎？')) {
        recordedPoints = [];
        saveAndRender();
        location.reload();
      }
    }

    window.onload = renderInputTable;
  </script>
</body>
</html>
