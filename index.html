<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Wildlife Triangulation Pro+</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    :root {
      --primary: #2e7d32;
      --secondary: #1976d2;
      --danger: #d32f2f;
      --glass: rgba(255, 255, 255, 0.95);
    }

    body { 
      margin: 0; padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
      background: #f0f2f5;
      height: 100vh;
      display: flex; flex-direction: column;
      overflow: hidden;
    }

    #map { flex: 1; width: 100%; z-index: 1; }

    .bottom-panel {
      position: absolute; bottom: 0; left: 0; right: 0;
      z-index: 1000;
      background: var(--glass);
      backdrop-filter: blur(10px);
      border-radius: 20px 20px 0 0;
      box-shadow: 0 -5px 20px rgba(0,0,0,0.15);
      padding: 16px;
      max-height: 55vh;
      overflow-y: auto;
    }

    .action-grid {
      display: grid; grid-template-columns: repeat(2, 1fr);
      gap: 10px; margin-bottom: 15px;
    }

    button {
      border: none; padding: 12px 8px; border-radius: 10px;
      font-size: 0.9rem; font-weight: 600; color: white;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 5px;
    }

    .btn-record { background: var(--primary); }
    .btn-calc { background: var(--secondary); }
    .btn-share { background: #607d8b; }
    .btn-clear { background: #9e9e9e; }

    .table-scroll {
      width: 100%;
      overflow-x: auto;
      background: white;
      border-radius: 12px;
      border: 1px solid #ddd;
    }

    .input-table {
      width: 100%;
      min-width: 700px; /* 增加寬度以容納新欄位 */
      border-collapse: collapse;
      font-size: 0.8rem;
    }

    .input-table th {
      background: #f8f9fa; padding: 8px;
      border-bottom: 2px solid #eee; color: #666;
    }

    .input-table td {
      padding: 6px 4px; border-bottom: 1px solid #eee; text-align: center;
    }

    .input-table input {
      width: 95%; border: 1px solid #eee; padding: 6px 2px;
      border-radius: 4px; text-align: center; font-size: 0.8rem;
    }

    /* 活動狀態按鈕樣式 */
    .btn-active-status {
      padding: 4px 8px; border-radius: 5px; font-size: 0.75rem; width: 45px;
    }
    .status-yes { background: #e8f5e9; color: #2e7d32; border: 1px solid #2e7d32; }
    .status-no { background: #ffebee; color: #c62828; border: 1px solid #c62828; }

    .result-card {
      background: #e3f2fd; padding: 12px; border-radius: 10px;
      margin-top: 10px; border-left: 4px solid var(--secondary);
    }

    .del-btn { background: none; color: var(--danger); font-size: 1.2rem; }
    .hint { font-size: 0.75rem; color: #888; margin-bottom: 8px; text-align: center; }
  </style>
</head>
<body>

  <div id="map"></div>

  <div class="bottom-panel">
    <div class="action-grid">
      <button class="btn-record" onclick="recordPoint()">📍 自動定位</button>
      <button class="btn-calc" onclick="processInput()">📐 交點計算</button>
      <button class="btn-share" onclick="shareLocation()">📤 分享報表</button>
      <button class="btn-clear" onclick="clearAllData()">🗑️ 清除</button>
    </div>

    <p class="hint">⬅️ 左右滑動填寫：日期 | 時間 | 方位 | Gain | 強度 | 活動 ➡️</p>

    <div class="table-scroll">
      <table class="input-table">
        <thead>
          <tr>
            <th style="width: 85px;">日期</th>
            <th style="width: 60px;">時間</th>
            <th style="width: 80px;">緯度</th>
            <th style="width: 80px;">經度</th>
            <th style="width: 60px;">方位</th>
            <th style="width: 50px;">Gain</th>
            <th style="width: 50px;">強度</th>
            <th style="width: 60px;">活動</th>
            <th style="width: 30px;"></th>
          </tr>
        </thead>
        <tbody id="inputTableBody"></tbody>
      </table>
    </div>
    
    <div id="resultArea"></div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const map = L.map('map', { zoomControl: false }).setView([23.5, 121], 7);
    L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', { attribution: '© OpenTopoMap' }).addTo(map);
    L.control.zoom({ position: 'topright' }).addTo(map);

    let recordedPoints = JSON.parse(localStorage.getItem('wildlife_points') || '[]');
    let currentPrediction = null;

    function renderInputTable() {
      const tbody = document.getElementById('inputTableBody');
      tbody.innerHTML = '';
      recordedPoints.forEach((p, idx) => {
        const row = document.createElement('tr');
        const statusClass = p.isActive === '是' ? 'status-yes' : 'status-no';
        row.innerHTML = `
          <td><input type="text" value="${p.date}" onchange="updatePoint(${idx}, 'date', this.value)"></td>
          <td><input type="text" value="${p.time}" onchange="updatePoint(${idx}, 'time', this.value)"></td>
          <td><input type="number" step="any" value="${p.lat}" onchange="updatePoint(${idx}, 'lat', this.value)"></td>
          <td><input type="number" step="any" value="${p.lon}" onchange="updatePoint(${idx}, 'lon', this.value)"></td>
          <td><input type="number" placeholder="°" value="${p.bearing}" onchange="updatePoint(${idx}, 'bearing', this.value)"></td>
          <td><input type="number" value="${p.gain || ''}" onchange="updatePoint(${idx}, 'gain', this.value)"></td>
          <td><input type="number" value="${p.strength || ''}" onchange="updatePoint(${idx}, 'strength', this.value)"></td>
          <td><button class="btn-active-status ${statusClass}" onclick="toggleStatus(${idx})">${p.isActive || '否'}</button></td>
          <td><button class="del-btn" onclick="deletePoint(${idx})">×</button></td>
        `;
        tbody.appendChild(row);
      });
    }

    function toggleStatus(idx) {
      recordedPoints[idx].isActive = recordedPoints[idx].isActive === '是' ? '否' : '是';
      saveAndRender();
    }

    function updatePoint(idx, key, val) {
      recordedPoints[idx][key] = val;
      localStorage.setItem('wildlife_points', JSON.stringify(recordedPoints));
    }

    function deletePoint(idx) {
      if(confirm('刪除此筆資料？')) {
        recordedPoints.splice(idx, 1);
        saveAndRender();
      }
    }

    function saveAndRender() {
      localStorage.setItem('wildlife_points', JSON.stringify(recordedPoints));
      renderInputTable();
    }

    function recordPoint() {
      if (!navigator.geolocation) return alert('不支援定位');
      navigator.geolocation.getCurrentPosition(pos => {
        const now = new Date();
        const dateStr = `${now.getFullYear()}/${(now.getMonth()+1).toString().padStart(2,'0')}/${now.getDate().toString().padStart(2,'0')}`;
        const timeStr = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
        
        recordedPoints.push({
          date: dateStr,
          time: timeStr,
          lat: pos.coords.latitude.toFixed(5),
          lon: pos.coords.longitude.toFixed(5),
          bearing: '',
          gain: '',
          strength: '',
          isActive: '否'
        });
        saveAndRender();
      }, () => alert('定位失敗'));
    }

    function processInput() {
      map.eachLayer(l => { if(l instanceof L.Marker || l instanceof L.Polyline) map.removeLayer(l); });
      const validLines = [];
      recordedPoints.forEach((p) => {
        const lat = parseFloat(p.lat), lon = parseFloat(p.lon), brng = parseFloat(p.bearing);
        if (!isNaN(lat) && !isNaN(lon) && !isNaN(brng)) {
          const color = `hsl(${brng % 360}, 75%, 45%)`;
          L.circleMarker([lat, lon], { radius: 5, color: color, fillOpacity: 1 }).addTo(map);
          const rad = (90 - brng) * Math.PI / 180;
          const endLat = lat + Math.sin(rad) * 0.15;
          const endLon = lon + Math.cos(rad) * 0.15;
          L.polyline([[lat, lon], [endLat, endLon]], { color: color, weight: 2 }).addTo(map);
          validLines.push({ x: lon, y: lat, dx: Math.cos(rad), dy: Math.sin(rad) });
        }
      });

      let intersects = [];
      for (let i = 0; i < validLines.length; i++) {
        for (let j = i + 1; j < validLines.length; j++) {
          const l1 = validLines[i], l2 = validLines[j];
          const det = l1.dx * l2.dy - l1.dy * l2.dx;
          if (Math.abs(det) > 1e-10) {
            const t = ((l2.x - l1.x) * l2.dy - (l2.y - l1.y) * l2.dx) / det;
            intersects.push([l1.y + l1.dy * t, l1.x + l1.dx * t]);
          }
        }
      }

      if (intersects.length > 0) {
        const avgLat = intersects.reduce((a,b) => a + b[0], 0) / intersects.length;
        const avgLon = intersects.reduce((a,b) => a + b[1], 0) / intersects.length;
        currentPrediction = { lat: avgLat, lon: avgLon };
        L.marker([avgLat, avgLon]).addTo(map).bindPopup("預估位置").openPopup();
        map.setView([avgLat, avgLon], 14);
        document.getElementById('resultArea').innerHTML = `<div class="result-card"><strong>🎯 預測座標</strong><br>${avgLat.toFixed(5)}, ${avgLon.toFixed(5)}</div>`;
      }
    }

    async function shareLocation() {
      if (recordedPoints.length === 0) return alert('無資料可分享');
      
      let text = `【野生動物追蹤觀測紀錄】\n`;
      recordedPoints.forEach((p, i) => {
        text += `\n#${i+1} 紀錄時間: ${p.date} ${p.time}\n`;
        text += `座標: ${p.lat}, ${p.lon}\n`;
        text += `方位: ${p.bearing}° | Gain: ${p.gain||'-'} | 強度: ${p.strength||'-'}\n`;
        text += `活動狀態: ${p.isActive}\n`;
        text += `-------------------`;
      });

      if (currentPrediction) {
        text += `\n\n🎯 預測目標位置：\n${currentPrediction.lat.toFixed(5)}, ${currentPrediction.lon.toFixed(5)}\n`;
        text += `Google Maps: https://www.google.com/maps?q=${currentPrediction.lat.toFixed(5)},${currentPrediction.lon.toFixed(5)}`;
      }

      if (navigator.share) {
        try {
          await navigator.share({ title: '野生動物觀測紀錄', text: text });
        } catch (err) { console.log('分享取消'); }
      } else {
        const textArea = document.createElement("textarea");
        textArea.value = text;
        document.body.appendChild(textArea);
        textArea.select();
        document.execCommand('copy');
        document.body.removeChild(textArea);
        alert('紀錄已複製到剪貼簿，請貼上分享。');
      }
    }

    window.onload = renderInputTable;
  </script>
</body>
</html>
